<!DOCTYPE html>
<html>
<head>

<title>The Nostale Helper</title>

<link rel="icon" href="favicon.png?v=4">

<style>

body{
    font-family: Arial;
    background:#121212;
    color:white;
    text-align:center;
    padding-top:60px;
}

h1{
    font-size:42px;
}

.card{
    background:#1f1f1f;
    padding:20px;
    margin:20px auto;
    width:420px;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #333;
}

.row:last-child{
    border-bottom:none;
}

.best{
    font-size:22px;
    color:#ffcc00;
}

.updated{
    margin-top:20px;
    font-size:13px;
    color:#aaa;
}

.error{
    color:red;
}

</style>

</head>

<body>

<h1>Nostale Market Tracker</h1>

<div class="card">
    <div id="bestZone" class="best">Loading best zone...</div>
</div>

<div class="card" id="zoneContainer">
Loading fishing zones...
</div>

<div id="updatedTime" class="updated"></div>

<script>

function timeAgo(timestamp){

    const now = Math.floor(Date.now()/1000);
    const diff = now - timestamp;

    if(diff < 60) return diff + " seconds ago";

    const minutes = Math.floor(diff/60);

    if(minutes < 60) return minutes + " minutes ago";

    const hours = Math.floor(minutes/60);

    if(hours < 24) return hours + " hours ago";

    const days = Math.floor(hours/24);

    return days + " days ago";
}

async function loadData(){

    try{

        const response = await fetch("./fish_prices.json?nocache=" + Date.now());

        if(!response.ok){
            throw new Error("JSON file not found");
        }

        const data = await response.json();

        const best = data.best_zone;

        document.getElementById("bestZone").innerHTML =
            "🔥 Best Fishing Zone<br>" +
            best.zone + " → " +
            best.average_gold.toLocaleString() + " gold / catch";

        const container = document.getElementById("zoneContainer");
        container.innerHTML = "";

        data.zones
            .sort((a,b)=>b.average_gold-a.average_gold)
            .forEach(z => {

                const row = document.createElement("div");
                row.className = "row";

                row.innerHTML =
                    "<span>Zone " + z.zone + "</span>" +
                    "<span>" + z.average_gold.toLocaleString() + "</span>";

                container.appendChild(row);

            });

        document.getElementById("updatedTime").innerText =
            "Last updated: " + timeAgo(data.updated);

    }
    catch(err){

        console.error(err);

        document.getElementById("zoneContainer").innerHTML =
            "<div class='error'>Failed to load fish_prices.json</div>";

    }

}

loadData();

setInterval(loadData,30000);

</script>

</body>
</html>

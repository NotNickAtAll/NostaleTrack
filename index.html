<!DOCTYPE html>
<html>
<head>

<title>The Nostale Helper</title>

<link rel="icon" href="favicon.png?v=5">

<style>

body{
    font-family: Arial;
    background:#121212;
    color:white;
    text-align:center;
    padding-top:40px;
}

h1{
    font-size:42px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:30px;
}

.panel{
    width:380px;
}

.card{
    background:#1f1f1f;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #333;
}

.row:last-child{
    border-bottom:none;
}

.best{
    font-size:20px;
    color:#ffcc00;
}

.updated{
    margin-top:10px;
    font-size:12px;
    color:#aaa;
}

.title{
    font-size:20px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<h1>The Nostale Helper</h1>

<div class="container">

<!-- FISHING -->
<div class="panel">

<div class="card">
<div class="title">🎣 Fishing</div>
<div id="bestZone" class="best">Loading...</div>
</div>

<div class="card" id="zoneContainer">
Loading zones...
</div>

</div>


<!-- TIME SPACE -->
<div class="panel">

<div class="card">
<div class="title">🌀 Group Time Space</div>
<div id="tsContainer">Loading...</div>
</div>

</div>


<!-- GRINDING -->
<div class="panel">

<div class="card">
<div class="title">⚔ Grinding Spots</div>
<div id="grindContainer">Loading...</div>
</div>

</div>

</div>

<div id="updatedTime" class="updated"></div>

<script>

function timeAgo(timestamp){

    const now=Math.floor(Date.now()/1000)
    const diff=now-timestamp

    if(diff<60) return diff+" sec ago"

    const min=Math.floor(diff/60)

    if(min<60) return min+" min ago"

    const h=Math.floor(min/60)

    if(h<24) return h+" hr ago"

    return Math.floor(h/24)+" days ago"
}

async function loadFishing(){

    const r=await fetch("./fish_prices.json?"+Date.now())
    const data=await r.json()

    const best=data.best_zone

    document.getElementById("bestZone").innerHTML=
        "🔥 "+best.zone+" → "+best.average_gold.toLocaleString()+" gold"

    const c=document.getElementById("zoneContainer")
    c.innerHTML=""

    data.zones
        .sort((a,b)=>b.average_gold-a.average_gold)
        .forEach(z=>{

        const row=document.createElement("div")
        row.className="row"

        row.innerHTML=
            "<span>"+z.zone+"</span>"+
            "<span>"+z.average_gold.toLocaleString()+"</span>"

        c.appendChild(row)

    })

    document.getElementById("updatedTime").innerText=
        "Fishing updated "+timeAgo(data.updated)
}


async function loadTS(){

    const r=await fetch("./group_time_space.json?"+Date.now())
    const data=await r.json()

    const c=document.getElementById("tsContainer")
    c.innerHTML=""

    data.runs.forEach(run=>{

        const row=document.createElement("div")
        row.className="row"

        row.innerHTML=
            "<span>"+run.range+"</span>"+
            "<span>"+run.net_profit.toLocaleString()+" net</span>"

        c.appendChild(row)

    })

}


async function loadGrinding(){

    const r=await fetch("./grinding_spots.json?"+Date.now())
    const data=await r.json()

    const c=document.getElementById("grindContainer")
    c.innerHTML=""

    data.spots.forEach(s=>{

        const row=document.createElement("div")
        row.className="row"

        row.innerHTML=
            "<span>"+s.name+"</span>"+
            "<span>"+s.profit_per_hour.toLocaleString()+"/h</span>"

        c.appendChild(row)

    })

}

async function loadAll(){

    loadFishing()
    loadTS()
    loadGrinding()

}

loadAll()

setInterval(loadAll,30000)

</script>

</body>
</html>

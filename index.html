<!DOCTYPE html>
<html>

<head>

<title>The Nostale Helper</title>

<link rel="icon" href="favicon.png?v=9">

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
padding-top:40px;
}

h1{
font-size:42px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
}

.panel{
width:380px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #333;
}

.row:last-child{
border-bottom:none;
}

.clickable{
cursor:pointer;
transition:0.15s;
}

.clickable:hover{
background:#2a2a2a;
}

.best{
font-size:20px;
color:#ffcc00;
margin-bottom:15px;
}

.title{
font-size:20px;
margin-bottom:10px;
}

.details{
background:#181818;
padding:10px 0;
}

.updated{
margin-top:20px;
font-size:13px;
color:#aaa;
}

.fishName{
display:flex;
align-items:center;
gap:8px;
}

.fishIcon{
width:28px;
height:28px;
image-rendering:pixelated;
}

.fishPrices{
display:flex;
gap:10px;
font-size:14px;
}

.npc{
color:#cfcfcf;
}

.bazaar{
color:#7CFF8A;
}

</style>

</head>

<body>

<h1>The Nostale Helper</h1>

<div class="container">

<!-- Fishing -->

<div class="panel">

<div class="card">

<div class="title">🎣 Fishing</div>

<div id="bestZone" class="best">Loading...</div>

<div id="zoneContainer"></div>

</div>

</div>


<!-- Group Time Space -->

<div class="panel">

<div class="card">

<div class="title">🌀 Group Time Space</div>

<div id="tsContainer">Loading...</div>

</div>

</div>


<!-- Grinding -->

<div class="panel">

<div class="card">

<div class="title">⚔ Grinding Spots</div>

<div id="grindContainer">Loading...</div>

</div>

</div>

</div>

<div id="updatedTime" class="updated"></div>

<script>

let openedRow = null

function timeAgo(timestamp){

const now=Math.floor(Date.now()/1000)
const diff=now-timestamp

if(diff<60) return diff+" sec ago"

const min=Math.floor(diff/60)

if(min<60) return min+" min ago"

const h=Math.floor(min/60)

if(h<24) return h+" hr ago"

return Math.floor(h/24)+" days ago"

}



async function loadFishing(){

const r=await fetch("./fish_prices.json?"+Date.now())
const data=await r.json()

const best=data.best_zone

document.getElementById("bestZone").innerHTML =
"🔥 "+best.zone+" → "+
"🪙 "+best.npc_average_gold.toLocaleString()+" NPC / "+
"🏪 "+best.bazaar_average_gold.toLocaleString()+" Bazaar gold / catch"

const container=document.getElementById("zoneContainer")

container.innerHTML=""

data.zones
.sort((a,b)=>b.npc_average_gold-a.npc_average_gold)
.forEach(zone=>{

const row=document.createElement("div")

row.className="row clickable"

row.innerHTML =
"<span>"+zone.zone+"</span>"+
"<span>🪙 "+zone.npc_average_gold.toLocaleString()+"</span>"

row.onclick=()=>toggleFish(row,zone)

container.appendChild(row)

})

document.getElementById("updatedTime").innerText =
"Fishing updated "+timeAgo(data.updated)

}



function toggleFish(row,zone){

if(openedRow){
openedRow.remove()
openedRow=null
}

const details=document.createElement("div")

details.className="details"

const title=document.createElement("div")

title.style.fontWeight="bold"
title.style.margin="10px 0"

title.innerText="Fish in zone "+zone.zone

details.appendChild(title)

zone.fish.forEach(f=>{

const r=document.createElement("div")

r.className="row"

r.innerHTML =
"<span class='fishName'>" +
"<img src='"+f.icon+"' class='fishIcon'>" +
f.name+" ("+f.chance+")"+
"</span>"+
"<span class='fishPrices'>" +
"<span class='npc'>🪙 "+f.npc_value.toLocaleString()+"</span> / "+
"<span class='bazaar'>🏪 "+f.bazaar_value.toLocaleString()+"</span>"+
"</span>"

details.appendChild(r)

})

row.after(details)

openedRow=details

}



async function loadTS(){

const r=await fetch("./group_time_space.json?"+Date.now())
const data=await r.json()

const c=document.getElementById("tsContainer")

c.innerHTML=""

data.runs.forEach(run=>{

const row=document.createElement("div")

row.className="row"

row.innerHTML=
"<span>"+run.range+"</span>"+
"<span>"+run.net_profit.toLocaleString()+" net</span>"

c.appendChild(row)

})

}



async function loadGrinding(){

const r=await fetch("./grinding_spots.json?"+Date.now())
const data=await r.json()

const c=document.getElementById("grindContainer")

c.innerHTML=""

data.spots.forEach(s=>{

const row=document.createElement("div")

row.className="row"

row.innerHTML=
"<span>"+s.name+"</span>"+
"<span>"+s.profit_per_hour.toLocaleString()+"/h</span>"

c.appendChild(row)

})

}



async function loadAll(){

loadFishing()
loadTS()
loadGrinding()

}

loadAll()

setInterval(loadAll,30000)

</script>

</body>

</html>

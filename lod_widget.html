<div class="lodBox">

<div class="lodTitle">🔥 Land of Death</div>
<div id="nextLod"></div>

<div id="lodRows"></div>

</div>

<style>

body{margin:0}

.lodBox{
background:#1f1f1f;
padding:12px;
border-radius:12px;
width:420px;
margin:auto;
font-size:13px;
color:white;
font-family:Arial;
}

.lodTitle{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
text-align:center;
}

#nextLod{
color:#ffcc66;
margin-bottom:10px;
text-align:center;
}

.lodRow{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #333;
}

.lodRow:last-child{
border-bottom:none;
}

.active{
color:#7CFF8A;
}

</style>

<script>

const schedule=[
{start:0,end:2,ch:"7"},
{start:3,end:5,ch:"1"},
{start:6,end:8,ch:"1"},
{start:9,end:11,ch:"2"},
{start:12,end:14,ch:"3"},
{start:15,end:17,ch:"2,3,6"},
{start:18,end:20,ch:"4,5,7"},
{start:21,end:23,ch:"4,5,6"}
]

const rowsContainer=document.getElementById("lodRows")

const slots=[]

schedule.forEach(s=>{

const start=new Date()
start.setHours(s.start,0,0,0)

const end=new Date()
end.setHours(s.end,0,0,0)

const row=document.createElement("div")
row.className="lodRow"

row.innerHTML=`
<span class="time"></span>
<span>CH ${s.ch}</span>
<span class="count"></span>
`

rowsContainer.appendChild(row)

slots.push({start,end,ch:s.ch,row})

})

function formatTime(d){
return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
}

function update(){

const now=new Date()

let nextDiff=null
let nextCh=""

slots.forEach(slot=>{

const row=slot.row
const time=row.querySelector(".time")
const count=row.querySelector(".count")

time.innerText=formatTime(slot.start)+" - "+formatTime(slot.end)

if(now>=slot.start && now<=slot.end){

count.innerText="OPEN"
row.classList.add("active")

}else{

row.classList.remove("active")

const diff=(slot.start-now)/1000

if(diff>0){

const m=Math.floor(diff/60)
const s=Math.floor(diff%60)

count.innerText=m+"m "+s+"s"

if(nextDiff===null){
nextDiff=diff
nextCh=slot.ch
}

}else{

count.innerText="-"

}

}

})

if(nextDiff!==null){

const m=Math.floor(nextDiff/60)
const s=Math.floor(nextDiff%60)

document.getElementById("nextLod").innerText=
"🔥 Next LoD in "+m+"m "+s+"s (CH "+nextCh+")"

}else{

document.getElementById("nextLod").innerText="🔥 LoD closed"

}

}

update()
setInterval(update,1000)

</script>
